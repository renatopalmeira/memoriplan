<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<link rel="icon" type="image/png" href="/img/logo-icon.png">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Redefinir Senha — MemoriPlan</title>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=Space+Grotesk:wght@500;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/main.css">
<style>
body{background:linear-gradient(135deg,#1A1A1A 0%,#2D2D2D 50%,#1A1A1A 100%);min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px;position:relative;overflow:hidden}
body::before{content:'';position:absolute;top:-50%;left:-50%;width:200%;height:200%;background:radial-gradient(circle at 30% 40%,rgba(232,56,79,0.1) 0%,transparent 50%),radial-gradient(circle at 70% 60%,rgba(59,130,246,0.06) 0%,transparent 50%)}

.card{background:var(--bg-card);border-radius:20px;box-shadow:var(--shadow-xl);padding:40px 36px;width:100%;max-width:420px;position:relative;z-index:1;animation:fadeUp .5s ease}
@keyframes fadeUp{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}

.logo-area{text-align:center;margin-bottom:32px}
.logo-icon{width:56px;height:56px;background:linear-gradient(135deg,var(--accent),#FF6B6B);border-radius:16px;display:flex;align-items:center;justify-content:center;margin:0 auto 14px;box-shadow:0 6px 20px rgba(232,56,79,0.3)}
.logo-icon svg{width:28px;height:28px;color:#fff}
.logo-title{font-family:'Space Grotesk',sans-serif;font-size:26px;font-weight:800;color:var(--text-primary);letter-spacing:-.02em}
.logo-title span{color:var(--accent)}
.logo-sub{font-size:13px;color:var(--text-muted);margin-top:4px}
</style>
</head>
<body>

<div class="card">
  <div class="logo-area">
    <div class="logo-icon">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z"/><path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"/></svg>
    </div>
    <div class="logo-title">Memori<span>Plan</span></div>
    <div class="logo-sub">Redefinir senha</div>
  </div>

  <div class="error-msg" id="errorMsg"></div>
  <div class="success-msg" id="successMsg"></div>

  <div id="formView">
    <div class="form-group">
      <label class="form-label">Nova senha</label>
      <input class="form-input" id="inputPass" type="password" placeholder="Mínimo 6 caracteres">
    </div>
    <div class="form-group">
      <label class="form-label">Confirmar nova senha</label>
      <input class="form-input" id="inputPassConfirm" type="password" placeholder="Repita a senha">
    </div>
    <button class="btn-primary" id="btnSave" onclick="handleReset()">Salvar nova senha</button>
  </div>

  <div id="invalidView" style="display:none;text-align:center;padding:16px 0;">
    <p style="color:var(--text-muted);font-size:14px;margin-bottom:20px;">Link inválido ou expirado. Solicite um novo link de recuperação.</p>
    <a href="/login.html" class="btn-primary" style="display:block;text-decoration:none;text-align:center;">Ir para o Login</a>
  </div>
</div>

<script defer src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script defer src="js/config.js"></script>
<script defer src="js/auth.js"></script>

<script>
document.addEventListener('DOMContentLoaded', () => {
  // Supabase envia o token no hash da URL
  const hash = window.location.hash;
  if (!hash || !hash.includes('access_token')) {
    document.getElementById('formView').style.display = 'none';
    document.getElementById('invalidView').style.display = 'block';
  }
});

async function handleReset() {
  const pass = document.getElementById('inputPass').value;
  const confirm = document.getElementById('inputPassConfirm').value;
  const btn = document.getElementById('btnSave');
  const errEl = document.getElementById('errorMsg');
  const succEl = document.getElementById('successMsg');

  errEl.classList.remove('show');
  succEl.classList.remove('show');

  if (!pass || pass.length < 6) {
    errEl.textContent = 'A senha precisa ter pelo menos 6 caracteres.';
    errEl.classList.add('show');
    return;
  }
  if (pass !== confirm) {
    errEl.textContent = 'As senhas não coincidem.';
    errEl.classList.add('show');
    return;
  }

  btn.disabled = true;
  btn.textContent = 'Salvando...';

  const { error } = await sb.auth.updateUser({ password: pass });

  if (error) {
    errEl.textContent = 'Erro ao redefinir senha. Tente novamente.';
    errEl.classList.add('show');
    btn.disabled = false;
    btn.textContent = 'Salvar nova senha';
  } else {
    succEl.textContent = 'Senha redefinida com sucesso! Redirecionando...';
    succEl.classList.add('show');
    document.getElementById('formView').style.display = 'none';
    setTimeout(() => window.location.href = '/index.html', 2000);
  }
}
</script>
</body>
</html>
